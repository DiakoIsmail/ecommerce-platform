spring.application.name=order-service
server.port=8080

product-service.base-url=${PRODUCT_SERVICE_URL:http://localhost:8081}
spring.datasource.url=jdbc:postgresql://localhost:5433/orderdb
spring.datasource.username=order
spring.datasource.password=order

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.mvc.problemdetails.enabled=true
logging.level.com.diako.order_service=INFO

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer